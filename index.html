<script>
  const base = window.location.origin;
  const manifest = {
    name: "Dicionário MED-PA",
    short_name: "MED-PA",
    description: "Dicionário de regionalismos médicos do estado do Pará",
    theme_color: "#14532d",
    background_color: "#f0fdfa",
    display: "standalone",
    start_url: base + "/",
    icons: [
      { src: base + "/pwa-192x192.svg", sizes: "192x192", type: "image/svg+xml" },
      { src: base + "/pwa-512x512.svg", sizes: "512x512", type: "image/svg+xml" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = url;
  document.head.appendChild(link);
</script>
