<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/pwa-192x192.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#14532d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MED-PA">
  <title>Dicionário MED-PA</title>
  <script>
    const manifest = {
      name: "Dicionário MED-PA",
      short_name: "MED-PA",
      description: "Dicionário de regionalismos médicos do estado do Pará",
      theme_color: "#14532d",
      background_color: "#f0fdfa",
      display: "standalone",
      start_url: "/",
      icons: [
        { src: "/pwa-192x192.svg", sizes: "192x192", type: "image/svg+xml" },
        { src: "/pwa-512x512.svg", sizes: "512x512", type: "image/svg+xml" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = url;
    document.head.appendChild(link);
  </script>
</head>
<body>
<div id="root"></div>
